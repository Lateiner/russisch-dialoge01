<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Matching Dialog 2</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-color); margin-bottom: 10px; }
        p.instruction { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.95rem; }

        .matching-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            background: #fff;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            user-select: none;
            touch-action: manipulation;
        }

        .item.selected {
            border-color: var(--accent-color);
            background-color: #e1f5fe;
            transform: scale(1.02);
        }

        .item.matched {
            border-color: var(--success-color);
            background-color: #e8f5e9;
            cursor: default;
        }

        /* Farbcodes für die Lösung */
        .pair-0 { border-color: #3498db !important; background-color: #ebf5fb !important; }
        .pair-1 { border-color: #9b59b6 !important; background-color: #f5eef8 !important; }
        .pair-2 { border-color: #e67e22 !important; background-color: #fdf2e9 !important; }
        .pair-3 { border-color: #1abc9c !important; background-color: #e8f8f5 !important; }
        .pair-4 { border-color: #d35400 !important; background-color: #fbeee6 !important; }
        .pair-5 { border-color: #27ae60 !important; background-color: #e9f7ef !important; }

        .item.wrong {
            border-color: var(--error-color);
            background-color: #ffebee;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        button {
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }

        #solution-btn { background-color: #f39c12; }
        #reset-btn { background-color: #95a5a6; }

        .feedback {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }

        @media (max-width: 600px) {
            .matching-grid { grid-template-columns: 1fr; }
            .item { font-size: 0.9rem; padding: 10px; }
            .column-header { display: block; text-align: center; font-weight: bold; margin-bottom: 5px; color: var(--primary-color); }
        }
        @media (min-width: 601px) {
            .column-header { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Logik-Check: Dialog 2</h2>
    <p class="instruction">Welche Antwort passt zu welcher Frage? Klicke zuerst links die Frage und dann rechts die passende Antwort an.</p>

    <div class="matching-grid">
        <div class="column" id="left-col">
            <div class="column-header">Fragen</div>
        </div>
        <div class="column" id="right-col">
            <div class="column-header">Antworten</div>
        </div>
    </div>

    <div class="controls">
        <button id="solution-btn">Lösung anzeigen</button>
        <button id="reset-btn">Neu starten</button>
    </div>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    const pairs = [
        { left: "Как тебя зовут?", right: "Меня зовут Александр.", id: 0 },
        { left: "Ты студентка?", right: "Да, я учусь здесь.", id: 1 },
        { left: "Откуда ты?", right: "Я из России.", id: 2 },
        { left: "А ты откуда приехал?", right: "Я приехал из Германии.", id: 3 },
        { left: "Ты изучаешь русский язык?", right: "Да, я учу русский уже год.", id: 4 },
        { left: "А ты что изучаешь?", right: "Я изучаю язык и литературу.", id: 5 }
    ];

    let selectedLeft = null;
    let selectedRight = null;
    let matchedCount = 0;

    function shuffle(array) {
        return [...array].sort(() => Math.random() - 0.5);
    }

    function initGame() {
        const leftCol = document.getElementById('left-col');
        const rightCol = document.getElementById('right-col');
        leftCol.innerHTML = '<div class="column-header">Fragen</div>';
        rightCol.innerHTML = '<div class="column-header">Antworten</div>';
        document.getElementById('feedback').textContent = '';
        selectedLeft = null;
        selectedRight = null;
        matchedCount = 0;

        const shuffledLeft = shuffle(pairs);
        const shuffledRight = shuffle(pairs);

        shuffledLeft.forEach(pair => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = pair.left;
            div.dataset.id = pair.id;
            div.onclick = () => selectItem(div, 'left');
            leftCol.appendChild(div);
        });

        shuffledRight.forEach(pair => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = pair.right;
            div.dataset.id = pair.id;
            div.onclick = () => selectItem(div, 'right');
            rightCol.appendChild(div);
        });
    }

    function selectItem(element, side) {
        if (element.classList.contains('matched')) return;

        if (side === 'left') {
            document.querySelectorAll('#left-col .item').forEach(i => i.classList.remove('selected', 'wrong'));
            selectedLeft = element;
        } else {
            document.querySelectorAll('#right-col .item').forEach(i => i.classList.remove('selected', 'wrong'));
            selectedRight = element;
        }

        element.classList.add('selected');

        if (selectedLeft && selectedRight) {
            if (selectedLeft.dataset.id === selectedRight.dataset.id) {
                selectedLeft.classList.replace('selected', 'matched');
                selectedRight.classList.replace('selected', 'matched');
                selectedLeft = null;
                selectedRight = null;
                matchedCount++;
                if (matchedCount === pairs.length) {
                    document.getElementById('feedback').textContent = "Hervorragend! Alles logisch verknüpft. 🎉";
                    document.getElementById('feedback').style.color = "var(--success-color)";
                }
            } else {
                const l = selectedLeft;
                const r = selectedRight;
                l.classList.add('wrong');
                r.classList.add('wrong');
                setTimeout(() => {
                    l.classList.remove('selected', 'wrong');
                    r.classList.remove('selected', 'wrong');
                }, 500);
                selectedLeft = null;
                selectedRight = null;
            }
        }
    }

    document.getElementById('solution-btn').onclick = () => {
        document.querySelectorAll('.item').forEach(item => {
            item.classList.remove('selected', 'wrong');
            item.classList.add('matched');
            item.classList.add(`pair-${item.dataset.id}`);
        });
        document.getElementById('feedback').textContent = "Zusammengehörige Fragen und Antworten haben die gleiche Farbe.";
        document.getElementById('feedback').style.color = "var(--primary-color)";
    };

    document.getElementById('reset-btn').onclick = initGame;

    initGame();
</script>

</body>
</html>
