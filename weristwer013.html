<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Wer ist wer?</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --sveta-color: #d81b60;
            --sergey-color: #1976d2;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: var(--primary-color); margin-bottom: 5px; }
        p.instruction { color: #666; margin-bottom: 25px; font-size: 0.95rem; }

        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        #progress {
            height: 100%;
            background: var(--success-color);
            width: 0%;
            transition: width 0.3s;
        }

        /* Fact Card Area */
        .fact-area {
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .fact-card {
            background: #fff;
            border: 3px solid var(--primary-color);
            padding: 20px;
            border-radius: 12px;
            font-size: 1.25rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            animation: popIn 0.3s;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Selection Buttons */
        .profile-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .profile-btn {
            border: none;
            border-radius: 15px;
            padding: 20px 10px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .profile-btn:active { transform: scale(0.95); }
        .btn-sveta { background-color: var(--sveta-color); }
        .btn-sergey { background-color: var(--sergey-color); }

        .profile-btn .avatar { font-size: 2.5rem; }
        .profile-btn .name { font-size: 1.2rem; font-weight: bold; }

        /* Result Buckets */
        .result-lists {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
        }

        .list-box {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            min-height: 150px;
        }

        .list-box h3 {
            font-size: 0.9rem;
            margin-top: 0;
            text-align: center;
            padding-bottom: 5px;
            border-bottom: 1px dotted #ccc;
        }

        .sveta-text { color: var(--sveta-color); }
        .sergey-text { color: var(--sergey-color); }

        .fact-item {
            font-size: 0.8rem;
            background: white;
            padding: 5px 8px;
            margin-top: 5px;
            border-radius: 5px;
            border-left: 3px solid #ccc;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .controls { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        .btn-action { padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        #solution-btn { background-color: #f39c12; }
        #reset-btn { background-color: #95a5a6; }

        @media (max-width: 500px) {
            .profile-selection { gap: 10px; }
            .profile-btn .name { font-size: 1rem; }
            .result-lists { grid-template-columns: 1fr; }
            .fact-card { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Wer ist wer? (Сергей vs. Света)</h2>
    <p class="instruction">Ordne die Fakten aus Dialog 3 der richtigen Person zu.</p>
    
    <div class="progress-bar"><div id="progress"></div></div>

    <div class="fact-area" id="fact-area">
        <!-- Aktueller Fakt -->
    </div>

    <div class="profile-selection">
        <button class="profile-btn btn-sveta" onclick="assignFact('sveta')">
            <span class="avatar">👩‍💼</span>
            <span class="name">Света</span>
        </button>
        <button class="profile-btn btn-sergey" onclick="assignFact('sergey')">
            <span class="avatar">👨‍💻</span>
            <span class="name">Сергей</span>
        </button>
    </div>

    <div class="result-lists">
        <div class="list-box" id="list-sveta">
            <h3 class="sveta-text">Света</h3>
        </div>
        <div class="list-box" id="list-sergey">
            <h3 class="sergey-text">Сергей</h3>
        </div>
    </div>

    <div class="controls">
        <button class="btn-action" id="solution-btn" onclick="showSolution()">Lösung anzeigen</button>
        <button class="btn-action" id="reset-btn" onclick="initGame()">Neu starten</button>
    </div>
</div>

<script>
    const facts = [
        { text: "Новая сотрудница", owner: "sveta" },
        { text: "Программист", owner: "sergey" },
        { text: "Работает здесь уже четыре года", owner: "sergey" },
        { text: "Новый менеджер", owner: "sveta" },
        { text: "Ему/Ей нравится работать тут", owner: "sergey" },
        { text: "Желает удачи", owner: "sergey" },
        { text: "Надеется, что всё понравится", owner: "sveta" },
        { text: "Его/Её зовут Сергей", owner: "sergey" },
        { text: "Его/Её зовут Света", owner: "sveta" }
    ];

    let currentIndex = 0;
    let shuffledFacts = [];

    function initGame() {
        currentIndex = 0;
        shuffledFacts = [...facts].sort(() => Math.random() - 0.5);
        document.getElementById('list-sveta').innerHTML = '<h3 class="sveta-text">Света</h3>';
        document.getElementById('list-sergey').innerHTML = '<h3 class="sergey-text">Сергей</h3>';
        updateUI();
    }

    function updateUI() {
        const factArea = document.getElementById('fact-area');
        const progress = document.getElementById('progress');
        
        progress.style.width = (currentIndex / shuffledFacts.length * 100) + "%";

        if (currentIndex < shuffledFacts.length) {
            factArea.innerHTML = `<div class="fact-card">${shuffledFacts[currentIndex].text}</div>`;
        } else {
            factArea.innerHTML = `<div class="fact-card" style="border-color: var(--success-color)">Fertig! 🎉 Alles zugeordnet.</div>`;
        }
    }

    function assignFact(selectedOwner) {
        if (currentIndex >= shuffledFacts.length) return;

        const fact = shuffledFacts[currentIndex];
        
        if (fact.owner === selectedOwner) {
            addFactToList(fact.text, selectedOwner);
            currentIndex++;
            updateUI();
        } else {
            // Visuelles Feedback bei Fehler
            const card = document.querySelector('.fact-card');
            card.style.borderColor = "var(--error-color)";
            card.style.color = "var(--error-color)";
            setTimeout(() => {
                card.style.borderColor = "var(--primary-color)";
                card.style.color = "var(--primary-color)";
            }, 500);
        }
    }

    function addFactToList(text, owner) {
        const list = document.getElementById(`list-${owner}`);
        const div = document.createElement('div');
        div.className = 'fact-item';
        div.style.borderLeftColor = owner === 'sveta' ? 'var(--sveta-color)' : 'var(--sergey-color)';
        div.textContent = text;
        list.appendChild(div);
    }

    function showSolution() {
        initGame();
        facts.forEach(f => {
            addFactToList(f.text, f.owner);
        });
        currentIndex = facts.length;
        updateUI();
    }

    // Start
    initGame();
</script>

</body>
</html>
