<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Satzbau-Trainer mit Lösung</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --solution-color: #f39c12;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-color); margin-bottom: 10px; }
        p.instruction { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.95rem; }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #progress { height: 100%; background: var(--success-color); width: 0%; transition: width 0.3s; }

        .sentence-display {
            min-height: 60px;
            border: 2px dashed #ddd;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background-color: #fafafa;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            min-height: 80px;
        }

        .word-btn {
            background-color: white;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
            touch-action: manipulation;
        }

        .word-btn:active { transform: scale(0.95); }
        
        .word-btn.used {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        .word-btn.in-result {
            background-color: var(--accent-color);
            color: white;
        }

        /* Status Farben */
        .sentence-display.correct-bg {
            background-color: #e8f5e9;
            border-color: var(--success-color);
            border-style: solid;
        }
        .correct-item {
            background-color: var(--success-color) !important;
            border-color: var(--success-color) !important;
            color: white !important;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            color: white;
            transition: opacity 0.2s;
        }

        #check-btn { background-color: var(--accent-color); }
        #solution-btn { background-color: var(--solution-color); }
        #next-btn { background-color: var(--success-color); display: none; }
        #reset-btn { background-color: #95a5a6; }

        .feedback {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }

        @media (max-width: 480px) {
            .word-btn { padding: 8px 14px; font-size: 1rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Satzbau-Trainer</h2>
    <p class="instruction">Bilde den Satz, indem du die Wörter anklickst. Klicke ein Wort im grauen Feld an, um es zurückzulegen.</p>

    <div class="progress-bar"><div id="progress"></div></div>

    <div class="sentence-display" id="sentence-display"></div>

    <div class="word-pool" id="word-pool"></div>

    <div class="controls">
        <button class="btn" id="check-btn">Prüfen</button>
        <button class="btn" id="solution-btn">Lösung anzeigen</button>
        <button class="btn" id="next-btn">Nächster Satz</button>
        <button class="btn" id="reset-btn">Zurücksetzen</button>
    </div>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    const sentences = [
        "Привет! Меня зовут Ира.",
        "Как тебя зовут?",
        "Приятно познакомиться.",
        "Я приехал из Германии.",
        "Я рада с вами познакомиться.",
        "Я учу русский язык уже год.",
        "Ты уже хорошо говоришь по-русски."
    ];

    let currentIdx = 0;
    let selectedWords = [];
    let correctWords = [];

    const sentenceDisplay = document.getElementById('sentence-display');
    const wordPool = document.getElementById('word-pool');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const checkBtn = document.getElementById('check-btn');
    const solutionBtn = document.getElementById('solution-btn');
    const progress = document.getElementById('progress');

    function initRound() {
        feedback.textContent = "";
        nextBtn.style.display = "none";
        checkBtn.style.display = "block";
        solutionBtn.style.display = "block";
        sentenceDisplay.classList.remove('correct-bg');
        selectedWords = [];
        sentenceDisplay.innerHTML = "";
        
        const fullSentence = sentences[currentIdx];
        correctWords = fullSentence.split(' ');
        
        progress.style.width = (currentIdx / sentences.length * 100) + "%";

        let shuffled = [...correctWords].sort(() => Math.random() - 0.5);
        renderPool(shuffled);
    }

    function renderPool(words) {
        wordPool.innerHTML = "";
        words.forEach((word) => {
            const btn = document.createElement('button');
            btn.className = 'word-btn';
            btn.textContent = word;
            btn.onclick = () => selectWord(btn, word);
            wordPool.appendChild(btn);
        });
    }

    function selectWord(poolBtn, word) {
        selectedWords.push(word);
        poolBtn.classList.add('used');
        
        const resultBtn = document.createElement('button');
        resultBtn.className = 'word-btn in-result';
        resultBtn.textContent = word;
        resultBtn.onclick = () => {
            if (nextBtn.style.display === "block") return; // Deaktivieren wenn fertig
            const idx = selectedWords.lastIndexOf(word);
            selectedWords.splice(idx, 1);
            resultBtn.remove();
            poolBtn.classList.remove('used');
            feedback.textContent = "";
        };
        sentenceDisplay.appendChild(resultBtn);
        feedback.textContent = "";
    }

    checkBtn.onclick = () => {
        const userSentence = selectedWords.join(' ');
        const targetSentence = correctWords.join(' ');

        if (userSentence === targetSentence) {
            showSuccessState();
            feedback.textContent = "Правильно! (Richtig!) 🎉";
            feedback.style.color = "var(--success-color)";
        } else {
            feedback.textContent = "Noch nicht ganz richtig.";
            feedback.style.color = "var(--error-color)";
        }
    };

    solutionBtn.onclick = () => {
        // Alles leeren
        sentenceDisplay.innerHTML = "";
        selectedWords = [...correctWords];
        
        // Den Satz korrekt aufbauen (visuell)
        selectedWords.forEach(word => {
            const btn = document.createElement('button');
            btn.className = 'word-btn in-result correct-item';
            btn.textContent = word;
            sentenceDisplay.appendChild(btn);
        });

        showSuccessState();
        feedback.textContent = "Hier ist die richtige Lösung.";
        feedback.style.color = "var(--solution-color)";
    };

    function showSuccessState() {
        sentenceDisplay.classList.add('correct-bg');
        document.querySelectorAll('.in-result').forEach(b => b.classList.add('correct-item'));
        wordPool.innerHTML = "";
        checkBtn.style.display = "none";
        solutionBtn.style.display = "none";
        nextBtn.style.display = "block";
    }

    nextBtn.onclick = () => {
        currentIdx++;
        if (currentIdx < sentences.length) {
            initRound();
        } else {
            sentenceDisplay.innerHTML = "";
            wordPool.innerHTML = "<h3>Hervorragend! 🎉</h3><p>Alle Sätze wurden erfolgreich gelernt.</p>";
            nextBtn.style.display = "none";
            checkBtn.style.display = "none";
            solutionBtn.style.display = "none";
            progress.style.width = "100%";
            feedback.textContent = "";
        }
    };

    document.getElementById('reset-btn').onclick = initRound;

    initRound();
</script>

</body>
</html>
