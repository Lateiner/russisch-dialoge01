<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Hörverstehen Dialog 2</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: var(--primary-color); margin-bottom: 10px; }
        p.instruction { color: #666; margin-bottom: 25px; font-size: 0.95rem; }

        .progress-container {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            height: 8px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: var(--success-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Audio Button */
        .audio-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            transition: transform 0.2s, background-color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .audio-btn:active { transform: scale(0.9); }
        .audio-btn:hover { background-color: #2980b9; }

        /* Antwort-Kacheln */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-card {
            background: #fff;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .option-card:hover { border-color: var(--accent-color); background-color: #f0f8ff; }

        .correct { 
            background-color: var(--success-color) !important; 
            border-color: var(--success-color) !important; 
            color: white; 
            font-weight: bold;
        }
        
        .incorrect { 
            background-color: var(--error-color) !important; 
            border-color: var(--error-color) !important; 
            color: white; 
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #next-btn { background-color: var(--primary-color); color: white; display: none; }
        #reset-btn { background-color: #95a5a6; color: white; }

        .feedback-text {
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .option-card { font-size: 0.95rem; padding: 12px; }
            .audio-btn { width: 70px; height: 70px; font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hörverstehen: Dialog 2</h2>
    <p class="instruction">Klicke auf das Lautsprecher-Symbol, um den Satz zu hören. Wähle dann die richtige schriftliche Form aus.</p>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <button class="audio-btn" onclick="playCurrentSentence()" id="play-btn">🔊</button>

    <div class="options-grid" id="options-grid">
        <!-- JS generiert hier die Karten -->
    </div>

    <div class="controls">
        <button class="btn" id="next-btn" onclick="nextQuestion()">Nächster Satz</button>
        <button class="btn" id="reset-btn" onclick="initGame()">Neu starten</button>
    </div>

    <div id="feedback" class="feedback-text"></div>
</div>

<script>
    const allSentences = [
        "„Меня зовут Александр, а тебя?“",
        "„Да, я учусь здесь, а ты?“",
        "„Я тоже студент. Откуда ты?“",
        "„Я приехал из Германии.“",
        "„Хм, ты изучаешь русский язык?“",
        "„Я учу русский язык уже год.“",
        "„Я хочу стать преподавателем.“",
        "„Кстати, ты уже хорошо говоришь по-русски.“",
        "„Я был рад с тобой познакомиться.“",
        "„И я была рада. Пока!“"
    ];

    let currentIdx = 0;
    let currentSentence = "";
    let canClick = true;
    let gamePool = [];

    function shuffle(array) {
        return [...array].sort(() => Math.random() - 0.5);
    }

    function playCurrentSentence() {
        window.speechSynthesis.cancel();
        // Wir entfernen die deutschen Anführungszeichen für die Sprachausgabe
        const cleanText = currentSentence.replace(/[„“]/g, '');
        const msg = new SpeechSynthesisUtterance();
        msg.text = cleanText;
        msg.lang = 'ru-RU';
        msg.rate = 0.85; 
        window.speechSynthesis.speak(msg);
    }

    function initGame() {
        currentIdx = 0;
        gamePool = shuffle(allSentences);
        showQuestion();
    }

    function showQuestion() {
        canClick = true;
        document.getElementById('feedback').textContent = "";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('progress-bar').style.width = (currentIdx / gamePool.length * 100) + "%";
        
        currentSentence = gamePool[currentIdx];
        
        // Erstelle 4 Optionen (1 richtige, 3 falsche)
        let options = [currentSentence];
        let others = allSentences.filter(s => s !== currentSentence);
        let shuffledOthers = shuffle(others);
        options.push(shuffledOthers[0], shuffledOthers[1], shuffledOthers[2]);
        
        const finalOptions = shuffle(options);
        renderOptions(finalOptions);
        
        // Automatisch abspielen beim Start der Runde (optional)
        setTimeout(playCurrentSentence, 500);
    }

    function renderOptions(options) {
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        options.forEach(text => {
            const div = document.createElement('div');
            div.className = 'option-card';
            div.textContent = text;
            div.onclick = () => checkAnswer(div, text);
            grid.appendChild(div);
        });
    }

    function checkAnswer(element, selectedText) {
        if (!canClick) return;

        if (selectedText === currentSentence) {
            element.classList.add('correct');
            document.getElementById('feedback').textContent = "Правильно! ✅";
            document.getElementById('feedback').style.color = "var(--success-color)";
            canClick = false;
            document.getElementById('next-btn').style.display = "block";
        } else {
            element.classList.add('incorrect');
            document.getElementById('feedback').textContent = "Versuch es nochmal! ❌";
            document.getElementById('feedback').style.color = "var(--error-color)";
            setTimeout(() => {
                if (canClick) element.classList.remove('incorrect');
            }, 800);
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < gamePool.length) {
            showQuestion();
        } else {
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('options-grid').innerHTML = "";
            document.getElementById('play-btn').style.display = "none";
            document.getElementById('feedback').innerHTML = "<h3>Hervorragend! 🎉</h3><p>Du hast alle Sätze erkannt.</p>";
            document.getElementById('next-btn').style.display = "none";
        }
    }

    // Initialisierung
    initGame();
</script>

</body>
</html>
